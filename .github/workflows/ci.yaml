name: CI Pipeline

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - run: |
          python -m pip install --upgrade pip
          pip install flake8 black
      - run: flake8 app/ --count --select=E9,F63,F7,F82 --show-source --statistics
      - run: black --check app/ || true

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - run: |
          pip install -r app/requirements.txt
          pip install -r tests/requirements.txt
      - run: pytest tests/ -v --cov=app --cov-report=term-missing

  build-test:
    name: Build and Test Docker Image
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v3
      - uses: docker/setup-buildx-action@v2
      - uses: docker/build-push-action@v4
        with:
          context: ./lab9/app
          file: ./lab9/app/Dockerfile
          push: false
          tags: flask-app:test
      - run: |
          docker run -d --name redis-test redis:alpine
          docker run -d --name test-container --link redis-test:redis-service -e REDIS_HOST=redis-service -p 5000:5000 flask-app:test
          sleep 5
          curl -f http://localhost:5000/health || exit 1
          docker stop test-container redis-test
          docker rm test-container redis-test
