---
- name: "Установка nginx и деплой индексной страницы"
  hosts: web
  become: true
  gather_facts: true

  vars:
    nginx_package: nginx
    nginx_service: nginx
    nginx_document_root: /var/www/html
    index_file_name: index.html
    hello_message: "Hello from Ansible"
    deploy_timestamp: "{{ ansible_date_time.iso8601 | default('unknown') }}"

  tasks:
    - name: "Установить nginx"
      apt:
        name: "{{ nginx_package }}"
        state: present
        update_cache: true
      when: ansible_os_family == "Debian"
      tags: [install, nginx]

    - name: "Запустить и включить сервис nginx"
      systemd:
        name: "{{ nginx_service }}"
        state: started
        enabled: true
      tags: [service, nginx]

    - name: "Убедиться, что директория существует"
      file:
        path: "{{ nginx_document_root }}"
        state: directory
        mode: '0755'
        owner: www-data
        group: www-data
      tags: [deploy]

    - name: "Разместить index.html"
      template:
        src: "{{ playbook_dir }}/../templates/index.html.j2"
        dest: "{{ nginx_document_root }}/{{ index_file_name }}"
        mode: '0644'
        owner: www-data
        group: www-data
      notify: "Перезагрузка сервиса nginx"
      tags: [deploy, template]

    - name: "Проверить, что сервис nginx отвечает"
      uri:
        url: "http://localhost/{{ index_file_name }}"
        return_content: true
        status_code: 200
      register: nginx_response
      retries: 3
      delay: 2
      until: nginx_response.status == 200
      tags: [verify]

    - name: "Показать результат"
      debug:
        msg: "Nginx успешно развёрнут на {{ inventory_hostname }}. Ответ: {{ nginx_response.content[:100] }}..."
      tags: [verify]

  handlers:
    - name: "Перезагрузка сервиса nginx"
      systemd:
        name: "{{ nginx_service }}"
        state: reloaded
      listen: "Reload nginx"
