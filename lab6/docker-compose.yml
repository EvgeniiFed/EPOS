version: '3.8'

services:
  redis:
    image: redis:alpine
    container_name: lab6-redis
    ports:
      - "6379:6379"
    networks:
      - lab6-network

  flask-app:
    build: ./app
    container_name: lab6-flask
    ports:
      - "5000:5000"
    depends_on:
      - redis
    networks:
      - lab6-network

  prometheus:
    image: prom/prometheus:latest
    container_name: lab6-prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    depends_on:
      - flask-app
    networks:
      - lab6-network

  grafana:
    image: grafana/grafana:latest
    container_name: lab6-grafana
    ports:
      - "3000:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus
    networks:
      - lab6-network

networks:
  lab6-network:
    driver: bridge